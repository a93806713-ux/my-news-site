<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개선 요청 - 오늘의 경제 노트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #f0f2f5; color: #1a1a2e; }
    header { background: #1a1a2e; color: white; padding: 16px 0; text-align: center; }
    header h1 { font-size: 24px; font-weight: 700; }
    nav { background: #16213e; display: flex; justify-content: center; gap: 4px; padding: 8px; flex-wrap: wrap; }
    nav a { color: #ccd; text-decoration: none; padding: 6px 16px; border-radius: 20px; font-size: 13px; transition: all 0.2s; }
    nav a:hover, nav a.active { background: #4a6cf7; color: white; }
    .container { max-width: 600px; margin: 0 auto; padding: 40px 16px; }
    h2 { font-size: 22px; margin-bottom: 8px; }
    p.desc { font-size: 14px; color: #888; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    input, textarea { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1.5px solid #ddd; font-size: 14px; font-family: inherit; outline: none; }
    input:focus, textarea:focus { border-color: #1a1a2e; }
    textarea { height: 140px; resize: vertical; }
    button[type=submit] { width: 100%; padding: 12px; background: #1a1a2e; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-family: inherit; margin-top: 8px; }
    button[type=submit]:hover { background: #4a6cf7; }
    .success { background: #d1fae5; border-radius: 12px; padding: 24px; text-align: center; }
    .success h3 { font-size: 20px; color: #065f46; margin-bottom: 8px; }
    .success p  { font-size: 14px; color: #065f46; }
    .success a  { display: inline-block; margin-top: 16px; padding: 10px 24px; background: #1a1a2e; color: white; border-radius: 8px; text-decoration: none; }
  </style>
</head>
<body>
<header><h1>📒 오늘의 경제 노트</h1></header>
<nav>
  <a href="/">홈</a>
  <a href="/news/경제">경제</a>
  <a href="/news/주식">주식</a>
  <a href="/news/부동산">부동산</a>
  <a href="/stock">주가 검색</a>
  <a href="/feedback" class="active">개선 요청</a>
</nav>
<div class="container">
  {% if success %}
  <div class="success">
    <h3>✅ 소중한 의견 감사해요!</h3>
    <p>더 좋은 사이트를 만드는 데 반영할게요.</p>
    <a href="/">홈으로 돌아가기</a>
  </div>
  {% else %}
  <h2>💬 개선 요청 및 의견</h2>
  <p class="desc">사이트에서 불편한 점이나 추가됐으면 하는 기능을 알려주세요!</p>
  <form method="POST">
    <div class="form-group">
      <label>이름 (선택)</label>
      <input type="text" name="name" placeholder="익명으로 남겨도 괜찮아요">
    </div>
    <div class="form-group">
      <label>이메일 (선택)</label>
      <input type="email" name="email" placeholder="답변 받으실 이메일">
    </div>
    <div class="form-group">
      <label>의견 *</label>
      <textarea name="message" placeholder="개선 사항이나 요청 사항을 자유롭게 적어주세요" required></textarea>
    </div>
    <button type="submit">의견 보내기</button>
  </form>
  {% endif %}
</div>
</body>
</html>
